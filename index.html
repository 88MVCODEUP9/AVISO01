<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/imagens/banner.png">
<title>Site em Desenvolvimento</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f172a,#020617);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
color:white;
}

/* partículas */
canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* container */

.container{
position:relative;
z-index:2;
text-align:center;
padding:60px;
border-radius:25px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 0 40px rgba(79,142,247,0.3),
inset 0 0 40px rgba(255,255,255,0.05);

animation:fade 1.5s ease;
}

/* titulo */

h1{
font-size:42px;
margin-bottom:20px;

background:linear-gradient(90deg,#4f8ef7,#00e0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:glow 3s infinite alternate;
}

/* texto */

p{
font-size:18px;
opacity:0.9;
line-height:1.6;
max-width:500px;
margin:auto;
}

/* icone */

.icon{
font-size:70px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

/* loading */

.loading{
margin-top:30px;
display:flex;
justify-content:center;
gap:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
background:#4f8ef7;
animation:bounce 1.4s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

/* animações */

@keyframes glow{
from{filter:drop-shadow(0 0 5px #4f8ef7);}
to{filter:drop-shadow(0 0 20px #00e0ff);}
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes bounce{
0%,80%,100%{transform:scale(0)}
40%{transform:scale(1)}
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

footer{
position:absolute;
bottom:20px;
font-size:13px;
opacity:.6;
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="icon">🚧</div>

<h1>Site em Desenvolvimento</h1>

<p>
Este site ainda está em desenvolvimento.<br>
O criador está atualmente estudando o conteúdo que será abordado aqui.
</p>

<div class="loading">
<div class="dot"></div>
<div class="dot"></div>
<div class="dot"></div>
</div>

</div>

<footer>
© 2026 - Em construção
</footer>

<script>

/* partículas animadas */

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<120;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speedX:(Math.random()-0.5)*0.5,
speedY:(Math.random()-0.5)*0.5
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.speedX
p.y+=p.speedY

if(p.x<0||p.x>canvas.width)p.speedX*=-1
if(p.y<0||p.y>canvas.height)p.speedY*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fillStyle="rgba(79,142,247,0.7)"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth
canvas.height=window.innerHeight

})

</script>

</body>
</html>
